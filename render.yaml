services:
  # Backend API Service
  - type: web
    name: playto-kyc-api
    env: python
    region: singapore
    buildCommand: cd backend && pip install -r requirements.txt && python manage.py collectstatic --no-input && python manage.py migrate
    startCommand: cd backend && gunicorn playto_kyc.wsgi:application
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DATABASE_URL
        fromDatabase:
          name: playto-kyc-db
          property: connectionString

  # Frontend Static Site - NO region for static sites
  - type: web
    name: playto-kyc-frontend
    env: static
    buildCommand: cd frontend_kycApp && npm install && npm run build
    staticPublishPath: ./frontend_kycApp/build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        value: https://playto-kyc-api.onrender.com

databases:
  - name: playto-kyc-db
    databaseName: playtokyc
    user: playtokyc
    region: singapore
